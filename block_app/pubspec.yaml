name: lockin
description: "Lockin - スマホ依存対策アプリ"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状態管理
  flutter_riverpod: ^2.6.1

  # ルーティング
  go_router: ^14.6.3

  # ローカルDB
  path_provider: ^2.1.5

  # 課金
  purchases_flutter: ^8.2.2

  # Firebase（Phase2で有効化 - google-services.json / GoogleService-Info.plist が必要）
  # firebase_core: ^3.13.1
  # firebase_auth: ^5.5.3

  # アニメーション
  flutter_animate: ^4.5.2

  # グラフ
  fl_chart: ^0.70.2

  # ユーティリティ
  shared_preferences: ^2.3.5
  intl: ^0.20.2
  google_fonts: ^6.2.1
  permission_handler: ^11.4.0
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: false
  ios: true
  image_path: "assets/Gemini_Generated_Image_xupv52xupv52xupv.png"
  remove_alpha_ios: true
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/data/quotes.json
    - assets/Gemini_Generated_Image_xupv52xupv52xupv.png
