workflows:
  ios-testflight:
    name: Lockin iOS (TestFlight)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: block.koki
      vars:
        XCODE_PROJECT: "Lockin.xcodeproj"
        XCODE_SCHEME: "Lockin"
        BUNDLE_ID: "block.koki"
        APP_STORE_APPLE_ID: "$APP_STORE_APPLE_ID"
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: master
          include: true
          source: true
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate
      - name: Set build number
        script: |
          agvtool new-version -all $(($BUILD_NUMBER + 1))
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - Internal
      email:
        recipients:
          - kouki_1203@icloud.com
        notify:
          success: true
          failure: true

  ios-debug:
    name: Lockin iOS (Debug build)
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_PROJECT: "Lockin.xcodeproj"
        XCODE_SCHEME: "Lockin"
      xcode: latest
    triggering:
      events:
        - pull_request
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate Xcode project
        script: xcodegen generate
      - name: Build for simulator
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - /tmp/xcodebuild_logs/*.log
