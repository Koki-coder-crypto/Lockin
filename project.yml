name: Lockin
options:
  bundleIdPrefix: block
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "$(DEVELOPMENT_TEAM)"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Lockin:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Lockin
        excludes:
          - "**/.DS_Store"
    dependencies:
      - sdk: FamilyControls.framework
      - sdk: ManagedSettings.framework
      - sdk: DeviceActivity.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: block.koki
        PRODUCT_NAME: Lockin
        INFOPLIST_FILE: Lockin/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Lockin/Resources/Lockin.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: NO
    info:
      path: Lockin/Resources/Info.plist
      properties:
        CFBundleDisplayName: Lockin
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIRequiresFullScreen: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIUserInterfaceStyle: Dark
        UIViewControllerBasedStatusBarAppearance: false
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: Lockin/Resources/Lockin.entitlements
      properties:
        com.apple.developer.family-controls: true
